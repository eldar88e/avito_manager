services:
  base: &base
    image: rails
    build: .
    env_file: ./.env
    volumes:
      - ./public/adverts_list:/app/public/adverts_list

  rails:
    <<: *base
#    tty: true
#    stdin_open: true
    container_name: rails
    hostname: rails
    depends_on:
      - pg
    command: ['bundle', 'exec', 'rails', 's', '-p', '3000', '-b', '0.0.0.0']
    ports:
      - "127.0.0.1:3001:3000"
      - "172.17.0.1:3001:3000"
    networks:
      - net
    restart: always

  worker:
    <<: *base
    container_name: rails-worker
    hostname: worker
    depends_on:
      - pg
    command: ['bundle', 'exec', 'rails', 'solid_queue:start']
    networks:
      - net
    restart: always

  pg:
    image: postgres:16.11
    container_name: rails-pg
    hostname: pg
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
      TZ: Europe/Moscow
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - net
    restart: unless-stopped

  dozzle:
    image: amir20/dozzle:latest
    container_name: dozzle
    restart: unless-stopped
    expose:
      - "172.17.0.1:8081:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

volumes:
  db_data:

networks:
  net: